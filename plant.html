<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GardenKey Plant</title><style>
:root{--ink:#173324;--muted:#647267;--bg:#f4f0e7;--card:#fffaf0;--line:rgba(23,51,36,.13);--gold:#d9a441;--theme:#2f6b45}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at top,#fff8e9,var(--bg) 55%,#e2ecda);color:var(--ink)}main{max-width:760px;margin:auto;padding:14px}.hero{min-height:440px;border-radius:30px;padding:18px;display:flex;flex-direction:column;justify-content:space-between;color:white;background:linear-gradient(135deg,color-mix(in srgb,var(--theme),#000 22%),color-mix(in srgb,var(--theme),#fff 50%));box-shadow:0 18px 45px rgba(31,55,41,.14);overflow:hidden;position:relative}.hero:before{content:"";position:absolute;inset:-10%;background:radial-gradient(ellipse at 70% 30%,rgba(255,255,255,.40),transparent 34%),radial-gradient(ellipse at 20% 80%,var(--theme),transparent 45%);filter:blur(2px);opacity:.85}.hero:after{content:"";position:absolute;right:-30px;bottom:-20px;width:72%;height:62%;background:var(--plantArt);background-size:cover;background-position:center;border-radius:50% 0 0 0;opacity:.28;filter:saturate(1.1) contrast(1.05)}.hero>*{position:relative;z-index:1}.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.chip,.pill{border-radius:999px;padding:9px 13px;font-weight:850;background:rgba(255,255,255,.9);color:var(--ink)}.id{background:rgba(23,51,36,.48);color:white}.copy h1{font-size:clamp(3rem,16vw,6rem);line-height:.88;margin:6px 0;letter-spacing:-.07em}.latin{font-style:italic;font-size:1.18rem}.sub{font-size:1.15rem;line-height:1.45}.tags{display:flex;overflow:auto;gap:8px;padding:14px 2px}.card{background:rgba(255,250,240,.94);border:1px solid var(--line);border-radius:24px;padding:18px;margin:12px 0;box-shadow:0 18px 45px rgba(31,55,41,.10)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.care{display:flex;gap:12px;align-items:flex-start}.ico{width:42px;height:42px;border-radius:15px;background:#dfe9d5;display:grid;place-items:center;font-size:1.25rem}small,.label{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:850;font-size:.76rem}h2{margin:.1rem 0 .7rem;font-size:1.45rem}.list{list-style:none;margin:0;padding:0}.list li{border-top:1px solid var(--line);padding:12px 0;line-height:1.48}.list li:first-child{border-top:0}.list strong:after{content:": ";}.score{font-size:1.45rem;color:var(--gold);letter-spacing:.08em}.gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px}.photo{min-height:92px;border-radius:18px;background:#f8f5ec;border:1px solid var(--line);padding:12px;color:var(--ink);display:flex;align-items:end;font-weight:850}.button{display:inline-flex;border-radius:999px;padding:12px 16px;background:var(--gold);color:#241a05;text-decoration:none;font-weight:850;border:0}.muted{color:var(--muted)}.compGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.comp{display:flex;gap:10px;align-items:center;text-decoration:none;color:inherit;background:white;border:1px solid var(--line);border-radius:18px;padding:10px}.thumb{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--c,#2f6b45),#fff8e9)}.nav{display:flex;justify-content:space-between;gap:10px;margin:0 0 12px}.nav a{color:var(--ink);font-weight:850}@media(max-width:520px){.grid,.gallery,.compGrid{grid-template-columns:1fr}.hero{min-height:410px}}
</style></head><body><main id="app">Loading…</main><script>
const qs=new URLSearchParams(location.search); const id=qs.get('id')||'GK-LAV-001';
const icons={Water:'💧',Light:'☀️',Feeding:'🌱',Pruning:'✂️'};
function esc(s=''){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function stars(n){n=Number(n||0);return '★★★★★'.slice(0,n)+'☆☆☆☆☆'.slice(0,5-n)}
function art(p){return `radial-gradient(circle at 50% 28%, rgba(255,255,255,.78) 0 4%, transparent 5%), radial-gradient(circle at 30% 45%, ${p.theme||'#2f6b45'} 0 12%, transparent 13%), radial-gradient(circle at 65% 42%, ${p.theme||'#2f6b45'} 0 14%, transparent 15%), linear-gradient(135deg, ${p.theme||'#2f6b45'}, #eef5e8)`}
fetch('plants.json?b='+Date.now()).then(r=>r.json()).then(data=>{const p=data[id]; if(!p) throw Error('No plant found for '+id); document.documentElement.style.setProperty('--theme',p.theme||'#2f6b45'); document.documentElement.style.setProperty('--plantArt', art(p)); document.title=`GardenKey · ${p.name}`; const comp=(p.companions||[]).map(name=>{const linked=Object.values(data).find(x=>x.name.toLowerCase()===String(name).toLowerCase()); const href=linked?`plant.html?id=${linked.id}`:'#'; return `<a class="comp" href="${href}"><span class="thumb" style="--c:${linked?.theme||p.theme||'#2f6b45'}"></span><strong>${esc(name)}</strong></a>`}).join(''); app.innerHTML=`
<div class="nav"><a href="index.html">← GardenKey home</a><a href="create.html">Create tester plant</a></div>
<section class="hero"><div class="top"><span class="chip">GardenKey</span><span class="chip">PILOT V0.13</span><span class="chip id">${esc(p.id)}</span></div><div class="copy"><div class="latin">${esc(p.latinName)} ${p.variety?`· ${esc(p.variety)}`:''}</div><h1>${esc(p.name)}</h1><div class="sub">${esc(p.subtitle)}</div></div></section>
<div class="tags">${(p.tags||[]).map(t=>`<span class="pill">${esc(t)}</span>`).join('')}</div>
<section class="grid">${Object.entries(p.quickCare||{}).map(([k,v])=>`<div class="card care"><div class="ico">${icons[k]||'🌿'}</div><div><small>${k==='Pruning'?'Secateurs / pruning':esc(k)}</small><strong>${esc(v)}</strong></div></div>`).join('')}</section>
<section class="card"><h2>Plant photos to capture</h2><div class="gallery"><div class="photo">Hero: ${esc(p.photoPlan?.hero||'Whole plant photo')}</div>${(p.photoPlan?.gallery||[]).map(x=>`<div class="photo">${esc(x)}</div>`).join('')}</div><p class="muted">This is a simple shot list for now. Gallery upload comes later when GardenKey has proper storage.</p></section>
<section class="card"><h2>Care notes</h2><p>${esc(p.notes)}</p><ul class="list"><li><strong>Soil</strong>${esc(p.soil)}</li><li><strong>Growing medium</strong>${esc(p.medium)}</li></ul></section>
<section class="card"><h2>Common problems + fixes</h2><ul class="list">${(p.problems||[]).map(x=>`<li><strong>${esc(x.name)}</strong>${esc(x.fix)}</li>`).join('')}</ul></section>
<section class="card"><h2>Propagation</h2><ul class="list"><li><strong>Best season</strong>${esc(p.propagation?.season)}</li><li><strong>Methods</strong>${esc(p.propagation?.methods)}</li><li><strong>Tips</strong>${esc(p.propagation?.tips)}</li><li><strong>Tracker</strong>${esc(p.propagation?.tracker||'Coming soon')}</li></ul></section>
<section class="card"><h2>Pollinator value</h2><div class="score">${stars(p.pollinator?.score)}</div><p>${esc(p.pollinator?.value)}</p><p><strong>Flower-specific note: </strong>${esc(p.pollinatorFact)}</p></section>
<section class="card"><h2>Companion ideas</h2><div class="compGrid">${comp||'<p>No companion ideas yet.</p>'}</div></section>
<section class="card"><h2>Timing</h2><ul class="list">${Object.entries(p.timeline||{}).map(([k,v])=>`<li><strong>${esc(k)}</strong>${esc(v)}</li>`).join('')}</ul></section>
<section class="card"><h2>Seasonal actions</h2><ul class="list">${Object.entries(p.seasonalActions||{}).map(([k,v])=>`<li><strong>${esc(k)}</strong>${esc(v)}</li>`).join('')}</ul></section>
<section class="card"><h2>Weekly fact</h2><p>${esc(p.weeklyFact)}</p></section>
<section class="card"><h2>Feedback</h2><p>Testing this prototype? Send notes, bugs or ideas straight to David.</p><a class="button" href="mailto:davewalsh45pro@gmail.com?subject=GardenKey%20feedback%20${encodeURIComponent(p.id)}">Send feedback</a></section>`}).catch(e=>app.innerHTML=`<section class="card"><h2>Could not load plant</h2><p>${esc(e.message)}</p></section>`)
</script></body></html>
