<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GardenKey Plant</title><style>
:root{--green:#123c2d;--cream:#f7f2e7;--accent:#78a874}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(#fbf7ec,#efe7d7);color:var(--green)}.wrap{max-width:740px;margin:auto;padding:16px}.top{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px}.top a{font-weight:900;color:var(--green)}.hero{position:relative;min-height:520px;border-radius:36px;padding:26px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;background:radial-gradient(circle at 78% 36%,rgba(255,255,255,.65),transparent 25%),linear-gradient(135deg,var(--accent),#f8e3cf);box-shadow:0 10px 30px #0002}.hero:before{content:"";position:absolute;inset:0;background:var(--photo);background-size:cover;background-position:center;opacity:.33;mix-blend-mode:soft-light}.hero>*{position:relative}.pill{display:inline-block;background:rgba(255,255,255,.88);border:1px solid #fff8;border-radius:999px;padding:10px 18px;font-weight:900;margin:4px}.id{background:rgba(20,50,40,.55);color:white}.hero h1{font-size:76px;line-height:.9;margin:10px 0;color:white;text-shadow:0 2px 14px #0002}.latin{color:white;font-size:26px;font-style:italic}.sub{color:white;font-size:25px;line-height:1.35}.chips{display:flex;gap:10px;overflow-x:auto;padding:14px 0}.chip{background:white;border:1px solid #e5dccd;border-radius:999px;padding:10px 16px;font-weight:900;white-space:nowrap}.card{background:#fffaf1;border:1px solid #e2d7c4;border-radius:28px;padding:20px;margin:14px 0;box-shadow:0 4px 18px #0000000d}.care{display:grid;gap:12px}.careItem{display:flex;gap:16px;align-items:center;background:white;border:1px solid #e8dfcf;border-radius:22px;padding:14px}.icon{width:56px;height:56px;border-radius:18px;background:#e0ead9;display:grid;place-items:center;font-size:30px;flex:none}.label{font-size:14px;letter-spacing:.08em;color:#637469;font-weight:900;text-transform:uppercase}.value{font-size:22px;font-weight:900}.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.shot{min-height:120px;border-radius:20px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent),white 20%),#fff);padding:14px;color:white;font-weight:900;display:flex;align-items:end;position:relative;overflow:hidden}.shot:after{content:"Add photo";position:absolute;right:10px;top:10px;background:#ffffffcc;color:var(--green);padding:5px 9px;border-radius:999px;font-size:12px}.photoScore{height:12px;background:#eadfca;border-radius:999px;overflow:hidden}.photoScore span{display:block;height:100%;background:var(--accent);width:var(--pct)}.mini{display:flex;gap:10px;overflow-x:auto}.mini a{width:110px;flex:none;text-decoration:none;color:inherit;background:white;border:1px solid #e5dccd;border-radius:18px;padding:10px}.mini .thumb{height:58px;border-radius:14px;background:linear-gradient(135deg,var(--c),#fff)}.problem{border-top:1px solid #e8decc;padding:12px 0}.timeline{display:grid;grid-template-columns:repeat(12,1fr);gap:3px}.month{font-size:11px;text-align:center;background:#eee4d1;border-radius:7px;padding:5px 0}.on{background:var(--accent);color:white}.btn{display:inline-block;background:#d9a63a;color:#222;border-radius:999px;padding:12px 18px;text-decoration:none;font-weight:900;margin:5px 3px}.muted{color:#65746a}.small{font-size:13px;color:#65746a}@media(max-width:600px){.hero{min-height:460px}.hero h1{font-size:58px}.gallery{grid-template-columns:1fr 1fr}.wrap{padding:12px}.value{font-size:20px}}
</style></head><body><div class="wrap"><div class="top"><a href="index.html">← GardenKey home</a><a href="create.html">Create tester plant</a></div><div id="app"></div></div><script>
const plants={
'GK-LAV-001':{name:'Lavender',latin:'Lavandula angustifolia',variety:'English lavender',cat:'Herb / Perennial',sub:'Scented, sun-loving and loved by pollinators.',accent:'#9b7bd5',photo:'linear-gradient(135deg,#8063c8,#e7d8ff)',tags:['Full sun','Low water','Bee friendly','Free-draining soil'],water:'Water lightly once soil has dried',light:'Full sun, sheltered spot',feed:'Go easy — lavender hates rich, wet compost',prune:'Trim after flowering and again lightly in spring',soil:'Free-draining, gritty, not too rich',medium:'Compost mixed with grit/perlite. Think Mediterranean rather than damp Irish border.',poll:'Excellent for bees and butterflies; best value when several plants flower together.',fact:'Lavender has been used for centuries in linen cupboards — practical, fragrant and a bit fancy.',problems:[['Root rot','Usually from wet compost. Lift the pot, improve drainage, and mix in grit.'],['Poor flowering','Often too much shade or too much feed. Give it sun and lean soil.']],companions:['GK-ROS-001','GK-SED-001'],prop:'Semi-ripe cuttings in late summer. Keep them airy, not soggy. A tracker would be perfect here later.'},
'GK-ROS-001':{name:'Rose',latin:'Rosa',variety:'Shrub rose',cat:'Shrub',sub:'Classic flowering shrub with high ornamental value.',accent:'#d85b83',photo:'linear-gradient(135deg,#a53e65,#ffd1df)',tags:['Full sun','Flowers','Feed in spring','Pollinator value varies'],water:'Deep watering is better than little and often',light:'Full sun gives the best flowering',feed:'Feed in spring and again after first flush',prune:'Prune when the plant is dormant — usually Nov to Mar',soil:'Rich, fertile, free-draining soil',medium:'Good multipurpose compost with added loam and slow-release feed for pots.',poll:'Single and semi-double roses are far better for pollinators than very full doubles.',fact:'Some roses have been grown for over a thousand years. Garden drama with serious staying power.',problems:[['Black spot','Remove affected leaves, improve airflow, water at the base.'],['Aphids','Squish by hand or use a gentle soap spray; ladybirds usually help.']],companions:['GK-LAV-001','GK-ALY-001'],prop:'Hardwood cuttings can be tried when dormant. It is slow, but satisfying when it works.'},
'GK-FRN-001':{name:'Fern',latin:'Polypodiopsida',variety:'Hardy fern',cat:'Fern',sub:'Shade-loving foliage for calm, green corners.',accent:'#4f9b69',photo:'linear-gradient(135deg,#286f43,#b7e4c0)',tags:['Shade','Moist soil','Foliage','Low light'],water:'Keep lightly moist',light:'Shade to indirect light',feed:'Little feeding needed',prune:'Remove old fronds in late winter before new growth',soil:'Moist, humus-rich soil',medium:'Leaf mould, compost and a little bark work nicely. Woodland floor energy.',poll:'Not a nectar plant, but great structure and shelter for small wildlife.',fact:'Ferns are ancient. They were doing their thing long before flowering plants got popular.',problems:[['Crispy fronds','Usually too dry, too much sun, or wind scorch.'],['Slug damage','Accept a little damage or use wildlife-safe controls.']],companions:['GK-HOS-001','GK-ACE-001'],prop:'Division in spring is easiest. Spores are possible, but that is more of a rainy Sunday science project.'},
'GK-TOM-001':{name:'Tomato',latin:'Solanum lycopersicum',variety:'Cherry / salad tomato',cat:'Vegetable',sub:'Productive edible crop for sunny spots.',accent:'#d94f3d',photo:'linear-gradient(135deg,#b22d24,#ffd0a8)',tags:['Vegetable','Edible','Full sun','Summer crop'],water:'Keep evenly moist to avoid splitting',light:'Full sun and warmth',feed:'Tomato feed once flowers set',prune:'Pinch side shoots on cordon types',soil:'Fertile, moisture-retentive but draining',medium:'Peat-free multipurpose compost plus slow-release feed. Keep watering consistent.',poll:'Flowers are self-fertile but bumblebees help with vibration pollination.',fact:'Tomatoes are technically berries. Gardeners have been arguing about fruit and veg ever since.',problems:[['Blight','Improve airflow, avoid wet leaves, remove infected material quickly.'],['Splitting fruit','Usually inconsistent watering.']],companions:['GK-ALY-001','GK-LAV-001'],prop:'Sow indoors in spring. Warmth matters more than fussing.'},
'GK-DAH-001':{name:'Dahlia',latin:'Dahlia',variety:'Decorative dahlia',cat:'Tuber / Perennial',sub:'Bold late-season flowers and excellent cut stems.',accent:'#b84e7a',photo:'linear-gradient(135deg,#a33763,#ffd4e8)',tags:['Tuber','Cut flower','Summer','Autumn'],water:'Water well in dry spells',light:'Full sun',feed:'Feed once growing strongly',prune:'Deadhead often; lift tubers after frost in colder spots',soil:'Rich, free-draining soil',medium:'Compost, loam and drainage. Hungry plant, but do not leave tubers sitting wet.',poll:'Open-centred dahlias are much better for bees than tight pompom types.',fact:'Dahlias were once considered as a food crop. Thankfully we mostly kept the flowers.',problems:[['Slugs','Protect new shoots early. This is when they get hammered.'],['Snapped stems','Stake early, before you think you need to.']],companions:['GK-GLA-001','GK-SED-001'],prop:'Start tubers in spring. Basal cuttings are possible once shoots appear.'},
'GK-CAN-001':{name:'Canna',latin:'Canna indica',variety:'Canna lily',cat:'Rhizome / Tender perennial',sub:'Tropical foliage and bold flowers for containers.',accent:'#cc6d30',photo:'linear-gradient(135deg,#ac4e1f,#ffd0a0)',tags:['Tropical','Containers','Tender','Foliage'],water:'Water well in active growth',light:'Full sun to part sun',feed:'Feed regularly in summer',prune:'Remove spent flowers; overwinter frost-free',soil:'Rich and moisture-retentive',medium:'A rich container mix with good drainage. They like food and water in summer.',poll:'Flowers can attract pollinators, but foliage is often the main show.',fact:'Canna leaves can look like someone smuggled a tropical holiday onto your patio.',problems:[['Frost damage','Lift or protect before hard frost.'],['Leaf shredding','Wind exposure can make leaves tatty.']],companions:['GK-DAH-001','GK-SED-001'],prop:'Divide rhizomes in spring when growth is starting.'},
'GK-GLA-001':{name:'Gladiolus',latin:'Gladiolus',variety:'Garden gladiolus',cat:'Corm',sub:'Tall summer flower spikes from compact corms.',accent:'#e07a56',photo:'linear-gradient(135deg,#c95e44,#ffd9bc)',tags:['Corm','Cut flowers','Summer','Vertical accent'],water:'Water during dry spells while flowering',light:'Full sun',feed:'Light feed as spikes develop',prune:'Cut flower spikes; let leaves die back naturally',soil:'Free-draining fertile soil',medium:'Compost with grit/perlite in pots. Corms dislike sitting wet.',poll:'Open flowers may be visited by bees, though many are grown mainly for display.',fact:'Gladiolus comes from “gladius”, meaning sword. Very dramatic for something grown from a corm.',problems:[['Flopping','Plant deep enough and stake taller varieties.'],['Corm rot','Avoid wet winter compost. Lift and store if needed.']],companions:['GK-DAH-001','GK-ALY-001'],prop:'Plant corms in spring. Keep small cormlets if you like a long game.'},
'GK-HOS-001':{name:'Hosta',latin:'Hosta',variety:'Foliage hosta',cat:'Herbaceous perennial',sub:'Large leafy perennial for shade and containers.',accent:'#7aa35b',photo:'linear-gradient(135deg,#597f3e,#d5e8b8)',tags:['Shade','Foliage','Herbaceous','Container'],water:'Keep moist in dry weather',light:'Part shade to shade',feed:'Feed lightly in spring',prune:'Remove dead foliage after it dies back',soil:'Moist, fertile soil',medium:'Compost with leaf mould. Keep it rich but not waterlogged.',poll:'Flower spikes can attract bees, even if we mostly grow them for leaves.',fact:'Hostas are basically slug restaurants unless you give them a fighting chance.',problems:[['Slugs and snails','Use barriers, wildlife-safe controls, and check at night.'],['Scorched leaves','Too much sun or drought.']],companions:['GK-FRN-001','GK-ACE-001'],prop:'Divide in spring as new shoots appear.'},
'GK-ACE-001':{name:'Japanese Maple',latin:'Acer palmatum',variety:'Japanese maple',cat:'Tree / Shrub',sub:'Elegant small tree with beautiful leaf colour.',accent:'#b95342',photo:'linear-gradient(135deg,#8d332d,#ffd5b6)',tags:['Autumn colour','Part shade','Container','Sheltered'],water:'Keep evenly moist in pots',light:'Part shade and shelter',feed:'Light feed in spring',prune:'Minimal pruning; tidy when dormant, usually Nov to Mar',soil:'Moist but draining, slightly acidic if possible',medium:'Loam-based compost with bark/perlite. Avoid drying winds.',poll:'Small flowers can support insects, but the main value is structure and seasonal colour.',fact:'Japanese maples can look delicate, then casually steal the whole garden in autumn.',problems:[['Leaf scorch','Wind, sun or drought. Move to shelter if potted.'],['Dieback','Avoid heavy pruning and water stress.']],companions:['GK-FRN-001','GK-HOS-001'],prop:'Usually grafted commercially. Seed is possible but variable.'},
'GK-SED-001':{name:'Sedum',latin:'Hylotelephium / Sedum',variety:'Stonecrop',cat:'Succulent / Perennial',sub:'Drought-tolerant flowers loved by late pollinators.',accent:'#7fa36d',photo:'linear-gradient(135deg,#668a57,#d8e8c9)',tags:['Succulent','Dry','Pollinator','Easy'],water:'Water sparingly once established',light:'Full sun',feed:'Little feeding needed',prune:'Cut back old stems in spring',soil:'Free-draining soil',medium:'Gritty compost. Too rich and they flop.',poll:'Excellent late nectar for bees and butterflies when many flowers are fading.',fact:'Sedums are the “I’m grand” plants of the garden — dry spell, poor soil, still flowering.',problems:[['Flopping','Too much feed, shade or rich soil.'],['Rot','Too wet, especially in winter.']],companions:['GK-LAV-001','GK-DAH-001'],prop:'Stem cuttings root easily in spring/summer. Almost suspiciously easy.'}
};
const q=new URLSearchParams(location.search);const id=q.get('id')||'GK-LAV-001';const p=plants[id]||plants['GK-LAV-001'];document.documentElement.style.setProperty('--accent',p.accent);document.documentElement.style.setProperty('--photo',p.photo);const companions=p.companions||[];const pct=60;app.innerHTML=`<section class="hero"><div><span class="pill">GardenKey</span><span class="pill">PILOT V0.14</span><br><span class="pill id">${p.id||id}</span></div><div><div class="latin">${p.latin} · ${p.variety||''}</div><h1>${p.name}</h1><div class="sub">${p.sub}</div></div></section><div class="chips">${p.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div><section class="card care"><div class="careItem"><div class="icon">💧</div><div><div class="label">Water:</div><div class="value">${p.water}</div></div></div><div class="careItem"><div class="icon">☀️</div><div><div class="label">Light:</div><div class="value">${p.light}</div></div></div><div class="careItem"><div class="icon">🌱</div><div><div class="label">Feeding:</div><div class="value">${p.feed}</div></div></div><div class="careItem"><div class="icon">✂️</div><div><div class="label">Pruning / cutting back:</div><div class="value">${p.prune}</div></div></div></section><section class="card"><h2>Plant photos to capture</h2><p class="muted">A gentle checklist for building a useful record over time.</p><div class="photoScore" style="--pct:${pct}%"><span></span></div><p class="small">Profile photo completeness: ${pct}%</p><div class="gallery"><div class="shot">Hero</div><div class="shot">Flower close-up</div><div class="shot">Foliage</div><div class="shot">Winter / dormant look</div><div class="shot">Seed pod / fruit</div><div class="shot">Whole plant in pot/border</div></div></section><section class="card"><h2>Soil & medium</h2><p><b>Soil:</b> ${p.soil}</p><p><b>Suggested mix:</b> ${p.medium}</p></section><section class="card"><h2>Propagation</h2><p>${p.prop}</p><a class="btn" href="seedling.html">Open propagation / seedling tracker</a></section><section class="card"><h2>Pollinator note</h2><p>${p.poll}</p></section><section class="card"><h2>Common problems & fixes</h2>${p.problems.map(x=>`<div class="problem"><b>${x[0]}:</b> ${x[1]}</div>`).join('')}</section><section class="card"><h2>Companion ideas</h2><div class="mini">${companions.map(cid=>{let c=plants[cid];return c?`<a href="plant.html?id=${cid}"><div class="thumb" style="--c:${c.accent}"></div><b>${c.name}</b><div class="small">${c.cat}</div></a>`:''}).join('')}</div></section><section class="card"><h2>Seasonal timing</h2><p class="muted">Quick view. We can make this more plant-specific as the library grows.</p><div class="timeline">${['J','F','M','A','M','J','J','A','S','O','N','D'].map((m,i)=>`<div class="month ${[2,3,4,5,6,7,8].includes(i)?'on':''}">${m}</div>`).join('')}</div></section><section class="card"><h2>Weekly fact</h2><p>${p.fact}</p></section><section class="card"><h2>Feedback</h2><p>Spot something wrong or have a better tip?</p><a class="btn" href="mailto:davewalsh45pro@gmail.com?subject=GardenKey%20feedback%20-%20${encodeURIComponent(p.name)}">Send feedback</a></section>`;
</script></body></html>
