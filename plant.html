<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GardenKey Plant</title><style>
:root{--green:#123c2d;--cream:#f7f2e7;--accent:#78a874}*{box-sizing:border-box}a,a:visited,a:active{color:inherit}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(#fbf7ec,#efe7d7);color:var(--green)}.wrap{max-width:740px;margin:auto;padding:16px}.top{display:flex;justify-content:space-between;gap:10px;margin-bottom:10px}.top a{font-weight:900;color:var(--green);text-decoration:none}.hero{position:relative;min-height:420px;border-radius:36px;padding:26px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;background:linear-gradient(135deg,var(--accent),#f8e3cf);box-shadow:0 10px 30px #0002}.hero.hasPhoto{background-image:linear-gradient(0deg,rgba(10,30,20,.55),rgba(10,30,20,.05)),var(--photo);background-size:cover;background-position:center}.pill{display:inline-block;background:rgba(255,255,255,.9);border:1px solid #fff8;border-radius:999px;padding:10px 18px;font-weight:900;margin:4px 4px 0 0}.id{background:rgba(20,50,40,.55);color:white}.hero h1{font-size:64px;line-height:.95;margin:10px 0;color:white;text-shadow:0 2px 14px #0004}.latin{color:white;font-size:22px;font-style:italic;text-shadow:0 1px 8px #0004}.sub{color:white;font-size:22px;line-height:1.35;text-shadow:0 1px 8px #0004}.chips{display:flex;gap:10px;overflow-x:auto;padding:14px 0}.chip{background:white;border:1px solid #e5dccd;border-radius:999px;padding:10px 16px;font-weight:900;white-space:nowrap}.card{background:#fffaf1;border:1px solid #e2d7c4;border-radius:28px;padding:20px;margin:14px 0;box-shadow:0 4px 18px #0000000d}.care{display:grid;gap:12px}.careItem{display:flex;gap:16px;align-items:center;background:white;border:1px solid #e8dfcf;border-radius:22px;padding:14px}.icon{width:56px;height:56px;border-radius:18px;background:#e0ead9;display:grid;place-items:center;font-size:28px;flex:none}.label{font-size:13px;letter-spacing:.06em;color:var(--green);font-weight:900;text-transform:uppercase}.value{font-size:19px;font-weight:400}.seasons{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.season{background:white;border:1px solid #e8dfcf;border-radius:18px;padding:12px}.season b{display:block;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin-bottom:4px}.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.shot{min-height:110px;border-radius:20px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent),white 20%),#fff);padding:12px;color:white;font-weight:800;font-size:13px;display:flex;align-items:end;position:relative;overflow:hidden}.shot:after{content:"Add photo";position:absolute;right:8px;top:8px;background:#ffffffcc;color:var(--green);padding:4px 8px;border-radius:999px;font-size:11px}.mini{display:flex;gap:10px;overflow-x:auto}.mini a{width:110px;flex:none;text-decoration:none;color:inherit;background:white;border:1px solid #e5dccd;border-radius:18px;padding:10px}.mini .thumb{height:58px;border-radius:14px;background:var(--c);display:flex;align-items:center;justify-content:center;overflow:hidden}.mini .thumb svg{width:65%;height:65%}.heroArt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.35;pointer-events:none}.heroArt svg{width:55%;height:55%}.mini span.plain{width:110px;flex:none;background:#f2ece0;border:1px solid #e5dccd;border-radius:18px;padding:10px;display:block;text-align:left;font-size:13px;color:#637469}.mini span.plain b{display:block;color:#123c2d;font-size:14px;margin:4px 0 2px}.problem{border-top:1px solid #e8decc;padding:12px 0}.problem:first-child{border-top:none;padding-top:0}.stars{color:var(--gold,#d9a63a);letter-spacing:2px}.btn{display:inline-block;background:#d9a63a;color:#222;border-radius:999px;padding:12px 18px;text-decoration:none;font-weight:900;margin:5px 3px 0 0}.muted{color:#65746a}.small{font-size:13px;color:#65746a}.state{padding:40px 14px;text-align:center;color:#65746a}@media(max-width:600px){.hero{min-height:380px}.hero h1{font-size:46px}.gallery{grid-template-columns:1fr 1fr}.seasons{grid-template-columns:1fr}.wrap{padding:12px}.value{font-size:17px}}
</style></head><body><script src="icons.js"></script><div class="wrap"><div class="top"><a href="index.html">← GardenKey home</a><a href="create.html">Create tester plant</a></div><div id="app"><p class="state">Loading plant profile…</p></div></div><script>
const CARE_ICONS = {Water:'💧',Light:'☀️',Feeding:'🌱',Pruning:'✂️'};
const q = new URLSearchParams(location.search);
const id = q.get('id') || 'GK-LAV-001';

async function load(){
  try{
    const res = await fetch('plants.json', {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const plants = await res.json();
    const p = plants[id];
    if(!p){
      const ids = Object.keys(plants).slice(0,6).map(i=>`<a href="plant.html?id=${i}">${plants[i].name}</a>`).join(', ');
      app.innerHTML = `<div class="state"><p>No plant found for ID <b>${id}</b>.</p><p class="small">Try one of: ${ids}</p></div>`;
      return;
    }
    render(p, plants);
  }catch(err){
    app.innerHTML = '<p class="state">Could not load plants.json. If viewing this file directly from disk, serve it over http(s) (e.g. GitHub Pages or a local server) instead of file://.</p>';
    console.error('GardenKey: failed to load plant', err);
  }
}

function isoWeekNumber(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}
function currentWeeklyFact(p){
  const facts = p.weeklyFacts && p.weeklyFacts.length ? p.weeklyFacts : (p.weeklyFact ? [p.weeklyFact] : []);
  if(!facts.length) return '—';
  const week = isoWeekNumber(new Date());
  return facts[week % facts.length];
}

function findCompanionId(nameOrId, allPlants){
  if(allPlants[nameOrId]) return nameOrId;
  const hit = Object.values(allPlants).find(pl => pl.name === nameOrId);
  return hit ? hit.id : null;
}

function render(p, allPlants){
  document.documentElement.style.setProperty('--accent', p.theme || '#78a874');
  const hasPhoto = !!p.heroImage;
  if(hasPhoto) document.documentElement.style.setProperty('--photo', `url('${p.heroImage}')`);

  const care = p.quickCare || {};
  const careHtml = Object.keys(care).map(k =>
    `<div class="careItem"><div class="icon">${CARE_ICONS[k]||'🌿'}</div><div><div class="label">${k}</div><div class="value">${care[k]}</div></div></div>`
  ).join('');

  const seasons = p.seasonalActions || {};
  const seasonHtml = Object.keys(seasons).map(s =>
    `<div class="season"><b>${s}</b>${seasons[s]}</div>`
  ).join('');

  const companionLinks = p.companionLinks || {};
  const companionHtml = (p.companions||[]).map(name=>{
    const cid = companionLinks[name] || findCompanionId(name, allPlants);
    if(cid && allPlants[cid]){
      const c = allPlants[cid];
      return `<a href="plant.html?id=${cid}"><div class="thumb" style="--c:${c.theme||'#8dbb87'}">${gkIconSvg(c.category)}</div><b>${c.name}</b><div class="small">${c.category||''}</div></a>`;
    }
    return `<span class="plain"><div class="thumb" style="--c:#8dbb87">${gkIconSvg('Perennial')}</div><b>${name}</b><div class="small">Not yet in library</div></span>`;
  }).join('');

  const problemsHtml = (p.problems||[]).map(x => {
    if(typeof x === 'string') return `<div class="problem">${x}</div>`;
    const label = x.name || x.issue || x.problem || x.title;
    const fix = x.fix || x.solution || x.remedy || x.advice;
    if(!label && !fix) return '';
    return `<div class="problem"><b>${label || 'Issue'}:</b> ${fix || '—'}</div>`;
  }).filter(Boolean).join('') || '<p class="muted">No common problems logged yet.</p>';

  const photoPlan = p.photoPlan || {};
  const gallerySlots = [photoPlan.hero, ...(photoPlan.gallery||[])].filter(Boolean);
  const galleryHtml = gallerySlots.map(caption => `<div class="shot">${caption}</div>`).join('')
    || '<div class="shot">Hero photo</div><div class="shot">Flower / detail</div>';

  const pollinator = p.pollinator || {};
  const stars = pollinator.score ? '★'.repeat(pollinator.score) + '☆'.repeat(Math.max(0,5-pollinator.score)) : '';

  const prop = p.propagation || {};

  app.innerHTML = `
  <section class="hero${hasPhoto?' hasPhoto':''}">
    ${hasPhoto ? '' : `<div class="heroArt">${gkIconSvg(p.category)}</div>`}
    <div><span class="pill">GardenKey</span><span class="pill">PILOT V0.17</span><span class="pill id">${p.id}</span></div>
    <div><div class="latin">${p.latinName||''}${p.variety?' · '+p.variety:''}</div><h1>${p.name}${p.commonName?` <span style="font-size:0.5em;font-weight:600">(${p.commonName})</span>`:''}</h1><div class="sub">${p.subtitle||''}</div></div>
  </section>

  <div class="chips">${(p.tags||[]).map(t=>`<span class="chip">${t}</span>`).join('')}</div>

  <section class="card care">${careHtml || '<p class="muted">No care summary yet.</p>'}</section>

  ${seasonHtml ? `<section class="card"><h2>Jobs by season</h2><div class="seasons">${seasonHtml}</div></section>` : ''}

  <section class="card"><h2>Plant photos to capture</h2><p class="muted">A gentle checklist for building a useful record over time.</p><div class="gallery">${galleryHtml}</div></section>

  <section class="card"><p><b>Notes:</b> ${p.notes||'—'}</p><p><b>Soil:</b> ${p.soil||'—'}</p><p><b>Suggested mix:</b> ${p.medium||'—'}</p></section>

  <section class="card"><h2>Propagation</h2><p>${prop.methods||'—'}</p>${prop.season?`<p class="small"><b>Best time:</b> ${prop.season}</p>`:''}${prop.tips?`<p class="small"><b>Tip:</b> ${prop.tips}</p>`:''}<a class="btn" href="seedling.html">Open propagation / seedling tracker</a></section>

  <section class="card"><h2>Pollinator info</h2>${stars?`<p class="stars">${stars}</p>`:''}<p>${pollinator.value||p.pollinatorFact||'—'}</p></section>

  <section class="card"><h2>Common problems & fixes</h2>${problemsHtml}</section>

  <section class="card"><h2>Companion ideas</h2><div class="mini">${companionHtml || '<p class="muted">None logged yet.</p>'}</div></section>

  <section class="card"><h2>Weekly fact</h2><p>${currentWeeklyFact(p)}</p>${(p.weeklyFacts && p.weeklyFacts.length > 1) ? '<p class="small">These facts rotate weekly — check back next week for more.</p>' : ''}</section>

  <section class="card"><h2>Feedback</h2><p>Spot something wrong or have a better tip?</p><a class="btn" href="mailto:davewalsh45pro@gmail.com?subject=GardenKey%20feedback%20-%20${encodeURIComponent(p.name)}">Send feedback</a></section>
  `;
}

load();
</script></body></html>
