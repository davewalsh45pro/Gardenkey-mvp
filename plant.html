<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GardenKey Plant</title><style>
:root{--ink:#173324;--muted:#647267;--bg:#f4f0e7;--card:#fffaf0;--line:rgba(23,51,36,.13);--gold:#d9a441}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at top,#fff8e9,var(--bg) 55%,#e2ecda);color:var(--ink)}main{max-width:760px;margin:auto;padding:14px}.hero{min-height:430px;border-radius:30px;padding:18px;display:flex;flex-direction:column;justify-content:space-between;color:white;background:linear-gradient(135deg,var(--theme,#2f6b45),#e7efde);box-shadow:0 18px 45px rgba(31,55,41,.14);overflow:hidden}.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.chip,.pill{border-radius:999px;padding:9px 13px;font-weight:850;background:rgba(255,255,255,.9);color:var(--ink)}.id{background:rgba(23,51,36,.48);color:white}.copy h1{font-size:clamp(3rem,16vw,6rem);line-height:.88;margin:6px 0;letter-spacing:-.07em}.latin{font-style:italic;font-size:1.25rem}.sub{font-size:1.15rem;line-height:1.45}.tags{display:flex;overflow:auto;gap:8px;padding:14px 2px}.card{background:rgba(255,250,240,.94);border:1px solid var(--line);border-radius:24px;padding:18px;margin:12px 0;box-shadow:0 18px 45px rgba(31,55,41,.10)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.care{display:flex;gap:12px;align-items:flex-start}.ico{width:40px;height:40px;border-radius:14px;background:#dfe9d5;display:grid;place-items:center;font-size:1.2rem}small,.label{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:850;font-size:.76rem}h2{margin:.1rem 0 .7rem;font-size:1.45rem}.list{list-style:none;margin:0;padding:0}.list li{border-top:1px solid var(--line);padding:12px 0;line-height:1.45}.list li:first-child{border-top:0}.score{font-size:1.45rem;color:var(--gold);letter-spacing:.08em}.gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px}.photo{min-height:110px;border-radius:18px;background:linear-gradient(135deg,var(--theme,#2f6b45),#fff8e9);padding:12px;color:white;display:flex;align-items:end;font-weight:850}.button{display:inline-flex;border-radius:999px;padding:12px 16px;background:var(--gold);color:#241a05;text-decoration:none;font-weight:850}.muted{color:var(--muted)}@media(max-width:520px){.grid{grid-template-columns:1fr}.gallery{grid-template-columns:1fr}.hero{min-height:400px}}</style></head><body><main id="app">Loading…</main><script>
const qs=new URLSearchParams(location.search); const id=qs.get('id')||'GK-LAV-001';
const icons={Water:'💧',Light:'☀️',Feeding:'🌱',Pruning:'✂️'};
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function stars(n){return '★★★★★'.slice(0,n)+'☆☆☆☆☆'.slice(0,5-n)}
fetch('plants.json?b='+Date.now()).then(r=>r.json()).then(data=>{const p=data[id]; if(!p) throw Error('No plant found for '+id); document.documentElement.style.setProperty('--theme',p.theme||'#2f6b45'); document.title=`GardenKey · ${p.name}`; app.innerHTML=`
<section class="hero"><div class="top"><span class="chip">GardenKey</span><span class="chip">PILOT V0.12</span><span class="chip id">${esc(p.id)}</span></div><div class="copy"><div class="latin">${esc(p.latinName)} ${p.variety?`· ${esc(p.variety)}`:''}</div><h1>${esc(p.name)}</h1><div class="sub">${esc(p.subtitle)}</div></div></section>
<div class="tags">${(p.tags||[]).map(t=>`<span class="pill">${esc(t)}</span>`).join('')}</div>
<section class="grid">${Object.entries(p.quickCare||{}).map(([k,v])=>`<div class="card care"><div class="ico">${icons[k]||'🌿'}</div><div><small>${esc(k)}</small><strong>${esc(v)}</strong></div></div>`).join('')}</section>
<section class="card"><h2>Plant photos to capture</h2><div class="gallery"><div class="photo">Hero · ${esc(p.photoPlan?.hero||'Whole plant photo')}</div>${(p.photoPlan?.gallery||[]).map(x=>`<div class="photo">${esc(x)}</div>`).join('')}</div><p class="muted">Use these as your shot list for each plant profile.</p></section>
<section class="card"><h2>Care notes</h2><p>${esc(p.notes)}</p><ul class="list"><li><strong>Soil</strong>${esc(p.soil||'')}</li><li><strong>Growing medium</strong>${esc(p.medium||'')}</li></ul></section>
<section class="card"><h2>Common problems + fixes</h2><ul class="list">${(p.problems||[]).map(x=>`<li><strong>${esc(x.name)}</strong>${esc(x.fix)}</li>`).join('')}</ul></section>
<section class="card"><h2>Propagation</h2><ul class="list"><li><strong>Best season</strong>${esc(p.propagation?.season||'')}</li><li><strong>Methods</strong>${esc(p.propagation?.methods||'')}</li><li><strong>Tips</strong>${esc(p.propagation?.tips||'')}</li></ul></section>
<section class="card"><h2>Pollinator value</h2><div class="score">${stars(p.pollinator?.score||0)}</div><p>${esc(p.pollinator?.value||'')}</p></section>
<section class="card"><h2>Companion ideas</h2><div class="tags">${(p.companions||[]).map(t=>`<span class="pill">${esc(t)}</span>`).join('')}</div></section>
<section class="card"><h2>Timing</h2><ul class="list">${Object.entries(p.timeline||{}).map(([k,v])=>`<li><strong>${esc(k)}</strong>${esc(v)}</li>`).join('')}</ul></section>
<section class="card"><h2>Seasonal actions</h2><ul class="list">${Object.entries(p.seasonalActions||{}).map(([k,v])=>`<li><strong>${esc(k)}</strong>${esc(v)}</li>`).join('')}</ul></section>
<section class="card"><h2>Weekly fact</h2><p>${esc(p.weeklyFact||'')}</p></section>
<section class="card"><h2>Feedback</h2><p>Testing this prototype? Send notes, bugs or ideas straight to David.</p><a class="button" href="mailto:davewalsh45pro@gmail.com?subject=GardenKey%20feedback%20${encodeURIComponent(p.id)}">Send feedback</a></section>`}).catch(e=>app.innerHTML=`<section class="card"><h2>Could not load plant</h2><p>${esc(e.message)}</p></section>`)
</script></body></html>
