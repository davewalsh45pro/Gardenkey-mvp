<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GardenKey Admin V12</title><style>
:root{--ink:#173324;--muted:#647267;--bg:#f4f0e7;--card:#fffaf0;--line:rgba(23,51,36,.13);--gold:#d9a441;--green:#2f6b45}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at top,#fff8e9,var(--bg) 55%,#e2ecda);color:var(--ink)}main{max-width:920px;margin:auto;padding:14px}.hero,.card{border-radius:28px;background:rgba(255,250,240,.94);border:1px solid var(--line);box-shadow:0 18px 45px rgba(31,55,41,.10);padding:20px;margin:12px 0}.hero{background:linear-gradient(135deg,#173d2a,#72a66d);color:white}.hero h1{font-size:clamp(2.4rem,10vw,4rem);line-height:.95;margin:.2rem 0}.actions{display:flex;gap:10px;flex-wrap:wrap}.button{border:0;border-radius:999px;padding:12px 16px;background:var(--gold);color:#251a05;text-decoration:none;font-weight:850;cursor:pointer}.secondary{background:white;color:var(--ink);border:1px solid var(--line)}.danger{background:#f1d7cf;color:#762c1f}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px;font:inherit;background:white}textarea{min-height:86px}label{font-size:.78rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:850}.grid{display:grid;grid-template-columns:310px 1fr;gap:12px}.plant{display:block;text-align:left;width:100%;background:white;border:1px solid var(--line);border-radius:18px;padding:12px;margin:8px 0;color:inherit}.plant.active{outline:3px solid var(--gold)}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}.hint{color:var(--muted)}@media(max-width:760px){.grid,.form{grid-template-columns:1fr}.sticky{position:sticky;top:0;background:var(--bg);z-index:2;padding-top:8px}}</style></head><body><main>
<section class="hero"><p>GardenKey Dashboard</p><h1>V12 pilot content builder.</h1><p>Manage the expanded plant profiles, download <code>plants.json</code>, then upload it to GitHub.</p><div class="actions"><a class="button secondary" href="index.html">Home</a><button class="button secondary" onclick="resetLive()">Reset to live GitHub data</button><button class="button" onclick="downloadJSON()">Download plants.json</button></div></section>
<section class="grid"><aside class="card"><div class="actions sticky"><button class="button" onclick="newPlant()">+ Add blank plant</button></div><input id="search" placeholder="Search plants"><div id="plantList"></div></aside><section class="card"><h2 id="mode">Select a plant</h2><div class="actions"><a id="openProfile" class="button secondary" href="#" target="_blank">Open profile</a><button class="button secondary" onclick="copyUrl()">Copy NFC URL</button><button class="button danger" onclick="deletePlant()">Delete</button></div><div class="form" id="form"></div><div class="actions" style="margin-top:14px"><button class="button" onclick="savePlant()">Save to working library</button><button class="button secondary" onclick="duplicatePlant()">Duplicate</button><button class="button" onclick="downloadJSON()">Download plants.json</button></div><p class="hint">New plants are blank. Placeholder examples disappear as soon as you type.</p></section></section>
</main><script>
let data={}, current=null;
const fields=[['id','GardenKey ID','GK-000001'],['slug','Slug','dahlia'],['name','Plant name','Dahlia'],['latinName','Latin name','Dahlia'],['variety','Variety','Bishop of Llandaff'],['subtitle','Short description','Bold late-summer colour.'],['theme','Theme colour','#c23b72'],['tags','Tags','Full sun, Pollinator, Cut flowers'],['photoPlan.hero','Hero photo plan','Whole plant in flower'],['photoPlan.gallery','Gallery shot list','Close-up of flower | Foliage | Winter appearance | Seed pod'],['quickCare.Water','Water','Water deeply in dry spells'],['quickCare.Light','Light','Full sun'],['quickCare.Feeding','Feeding','Feed during active growth'],['quickCare.Pruning','Pruning','Deadhead regularly'],['notes','Notes','Personal care notes'],['soil','Soil','Free-draining, humus-rich soil'],['medium','Growing medium','Peat-free compost plus grit/leaf mould as needed'],['pollinator.score','Pollinator score 0-5','4'],['pollinator.value','Pollinator note','Great for bees if flowers are open-centred'],['companions','Companion plants','Salvia, Lavender, Rose'],['propagation.season','Propagation season','Spring'],['propagation.methods','Propagation methods','Division, cuttings or seed'],['propagation.tips','Propagation tips','Keep labelled and record success'],['timeline.Seeding','Seeding time','Mar-Apr'],['timeline.Flowering','Flowering time','Jun-Sep'],['timeline.Harvest','Harvest time','If applicable'],['timeline.Pruning','Pruning time','Seasonal'],['seasonalActions.Spring','Spring jobs','Check new growth'],['seasonalActions.Summer','Summer jobs','Water and deadhead'],['seasonalActions.Autumn','Autumn jobs','Reduce feeding'],['seasonalActions.Winter','Winter jobs','Protect pots'],['problems','Common problems + fixes','Root rot: Improve drainage | Aphids: Wash off or squash by hand'],['weeklyFact','Weekly fact','Interesting plant fact']];
function get(p,path){return path.split('.').reduce((o,k)=>o&&o[k],p)||''}function set(p,path,val){let a=path.split('.'),o=p;while(a.length>1){let k=a.shift();o[k]=o[k]||{};o=o[k]}o[a[0]]=val}
function normalize(p){p.tags=split(p.tags);p.companions=split(p.companions); if(typeof p.problems==='string') p.problems=p.problems.split('|').map(s=>{let [name,fix]=s.split(':');return{name:(name||'').trim(),fix:(fix||'').trim()}}).filter(x=>x.name); if(typeof p.photoPlan?.gallery==='string') p.photoPlan.gallery=p.photoPlan.gallery.split('|').map(s=>s.trim()).filter(Boolean); p.pollinator=p.pollinator||{}; p.pollinator.score=Number(p.pollinator.score||0); return p}
function split(x){return Array.isArray(x)?x:String(x||'').split(',').map(s=>s.trim()).filter(Boolean)}
function flatProblems(p){return Array.isArray(p.problems)?p.problems.map(x=>`${x.name}: ${x.fix}`).join(' | '):p.problems||''} function flatGallery(p){return Array.isArray(p.photoPlan?.gallery)?p.photoPlan.gallery.join(' | '):get(p,'photoPlan.gallery')}
function renderList(){let q=(search.value||'').toLowerCase(); let arr=Object.values(data).filter(p=>(p.name+p.id+(p.tags||[]).join(' ')).toLowerCase().includes(q)); plantList.innerHTML=arr.map(p=>`<button class="plant ${current===p.id?'active':''}" onclick="selectPlant('${p.id}')"><strong>${p.name}</strong><br><small>${p.id}</small></button>`).join('')||'<p>No plants yet.</p>'}
function renderForm(){let p=current?data[current]:{}; mode.textContent=current?`Editing ${p.name}`:'New plant'; openProfile.href=current?`plant.html?id=${current}`:'#'; form.innerHTML=fields.map(([path,label,ph])=>{let val= path==='problems'?flatProblems(p): path==='photoPlan.gallery'?flatGallery(p): path==='tags'||path==='companions'?(get(p,path)||[]).join(', '):get(p,path); let area=['notes','soil','medium','pollinator.value','photoPlan.hero','photoPlan.gallery','problems','weeklyFact'].includes(path)||path.startsWith('seasonalActions')||path.startsWith('propagation'); return `<div class="${area?'full':''}"><label>${label}</label>${area?`<textarea data-path="${path}" placeholder="${ph}">${val||''}</textarea>`:`<input data-path="${path}" placeholder="${ph}" value="${val||''}">`}</div>`}).join('')}
function selectPlant(id){current=id; renderList(); renderForm()}function newPlant(){current=null; renderList(); renderForm(); document.querySelector('[data-path="id"]').focus()}
function savePlant(){let p={quickCare:{},photoPlan:{},pollinator:{},propagation:{},timeline:{},seasonalActions:{}}; document.querySelectorAll('[data-path]').forEach(el=>set(p,el.dataset.path,el.value.trim())); if(!p.id)return alert('GardenKey ID is required'); p=normalize(p); data[p.id]=p; current=p.id; localStorage.setItem('gardenkey-v12-work',JSON.stringify(data)); renderList(); renderForm(); alert('Saved to working library. Download plants.json when ready.')} 
function deletePlant(){if(!current)return; if(confirm('Delete '+current+' from working library?')){delete data[current];current=null;renderList();renderForm()}}
function duplicatePlant(){if(!current)return; let p=JSON.parse(JSON.stringify(data[current])); p.id=p.id+'-COPY'; p.name=p.name+' copy'; data[p.id]=p; selectPlant(p.id)}
function downloadJSON(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='plants.json';a.click();}
function copyUrl(){if(!current)return; navigator.clipboard.writeText(location.href.replace('admin.html','plant.html?id='+current)); alert('NFC URL copied')}
function resetLive(){localStorage.removeItem('gardenkey-v12-work'); load(true)}
function load(force=false){fetch('plants.json?b='+Date.now()).then(r=>r.json()).then(j=>{data= force?j: JSON.parse(localStorage.getItem('gardenkey-v12-work')||'null')||j; renderList(); renderForm()})}
search.addEventListener('input',renderList); load();
</script></body></html>
