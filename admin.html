<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GardenKey Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell admin-shell">
    <section class="brand-card compact">
      <div class="brand-mark">GK</div>
      <p class="eyebrow">GardenKey Admin</p>
      <h1>Edit plant data without editing HTML.</h1>
      <p class="lede">Update fields below, then download your new <strong>plants.json</strong> and upload it to GitHub.</p>
    </section>

    <section class="card">
      <label for="plantSelect">Choose plant</label>
      <select id="plantSelect"></select>
      <div class="button-row">
        <button class="button secondary" id="newPlant" type="button">New plant</button>
        <button class="button primary" id="downloadJson" type="button">Download plants.json</button>
      </div>
    </section>

    <form class="card form-card" id="plantForm">
      <label>ID <input name="id" required /></label>
      <label>Slug <input name="slug" /></label>
      <label>Name <input name="name" required /></label>
      <label>Latin name <input name="latinName" /></label>
      <label>Subtitle <textarea name="subtitle"></textarea></label>
      <label>Tags, comma separated <input name="tags" /></label>
      <label>Water <input name="water" /></label>
      <label>Aspect / Light <input name="aspect" /></label>
      <label>Feeding <input name="feeding" /></label>
      <label>Pruning <input name="pruning" /></label>
      <label>Notes <textarea name="notes"></textarea></label>
      <button class="button primary full" type="submit">Save in browser preview</button>
    </form>

    <section class="card warning-card">
      <strong>Important:</strong> this static admin page saves in your browser only. To publish changes, download <strong>plants.json</strong> and upload it to GitHub, replacing the old file.
    </section>
  </main>

  <script>
    let plants = {};
    const select = document.getElementById('plantSelect');
    const form = document.getElementById('plantForm');

    function fillSelect() {
      select.innerHTML = Object.values(plants).map(p => `<option value="${p.id}">${p.name} — ${p.id}</option>`).join('');
    }

    function loadToForm(id) {
      const p = plants[id];
      if (!p) return;
      form.id.value = p.id || '';
      form.slug.value = p.slug || '';
      form.name.value = p.name || '';
      form.latinName.value = p.latinName || '';
      form.subtitle.value = p.subtitle || '';
      form.tags.value = (p.tags || []).join(', ');
      form.water.value = p.quickCare?.Water || '';
      form.aspect.value = p.quickCare?.Aspect || '';
      form.feeding.value = p.quickCare?.Feeding || '';
      form.pruning.value = p.quickCare?.Pruning || '';
      form.notes.value = p.notes || '';
    }

    function saveFromForm() {
      const oldId = select.value;
      const id = form.id.value.trim();
      if (!id) return;
      if (oldId && oldId !== id) delete plants[oldId];
      plants[id] = {
        ...(plants[id] || {}),
        id,
        slug: form.slug.value.trim(),
        name: form.name.value.trim(),
        latinName: form.latinName.value.trim(),
        subtitle: form.subtitle.value.trim(),
        photo: plants[id]?.photo || '',
        tags: form.tags.value.split(',').map(t => t.trim()).filter(Boolean),
        quickCare: {
          Water: form.water.value.trim(),
          Feeding: form.feeding.value.trim(),
          Aspect: form.aspect.value.trim(),
          Pruning: form.pruning.value.trim()
        },
        notes: form.notes.value.trim(),
        seasonalActions: plants[id]?.seasonalActions || {},
        problems: plants[id]?.problems || [],
        companions: plants[id]?.companions || [],
        propagation: plants[id]?.propagation || []
      };
      localStorage.setItem('gardenkey-plants', JSON.stringify(plants));
      fillSelect();
      select.value = id;
      alert('Saved in browser preview. Download plants.json when ready to publish.');
    }

    async function init() {
      const local = localStorage.getItem('gardenkey-plants');
      if (local) plants = JSON.parse(local);
      else {
        const response = await fetch('plants.json');
        plants = await response.json();
      }
      fillSelect();
      loadToForm(select.value);
    }

    select.addEventListener('change', () => loadToForm(select.value));
    form.addEventListener('submit', event => { event.preventDefault(); saveFromForm(); });
    document.getElementById('newPlant').addEventListener('click', () => {
      form.reset();
      form.id.value = 'GK-NEW-001';
      form.name.value = 'New Plant';
    });
    document.getElementById('downloadJson').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(plants, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'plants.json';
      a.click();
      URL.revokeObjectURL(url);
    });
    init();
  </script>
</body>
</html>
