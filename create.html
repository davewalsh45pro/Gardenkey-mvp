<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create GardenKey Tester Plant</title><style>
:root{--ink:#173324;--muted:#647267;--bg:#f4f0e7;--card:#fffaf0;--line:rgba(23,51,36,.13);--gold:#d9a441;--green:#2f6b45}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at top,#fff8e9,var(--bg) 55%,#e2ecda);color:var(--ink)}main{max-width:760px;margin:auto;padding:14px}.hero,.card{border-radius:28px;background:rgba(255,250,240,.96);border:1px solid var(--line);box-shadow:0 18px 45px rgba(31,55,41,.10);padding:20px;margin:12px 0}.hero{background:linear-gradient(135deg,#173d2a,#72a66d);color:white}.button{border:0;border-radius:999px;padding:12px 16px;background:var(--gold);color:#251a05;text-decoration:none;font-weight:850;cursor:pointer;font:inherit;display:inline-flex;margin:4px}input,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px;font:inherit;background:white;margin-bottom:10px}textarea{min-height:80px}label{font-size:.78rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:850}.hint{color:var(--muted)}</style></head><body><main>
<section class="hero"><p><a href="index.html" style="color:white;font-weight:850">GardenKey</a></p><h1>Create a tester plant.</h1><p>This creates a draft plant profile on your phone. During the pilot, send it to David and he can add it to the shared library.</p></section>
<section class="card"><label>Plant name</label><input id="name" placeholder="e.g. Gladiolus"><label>Category</label><input id="category" placeholder="e.g. Bulb, perennial, vegetable, herb"><label>Variety / cultivar</label><input id="variety" placeholder="e.g. Black Star"><label>Notes</label><textarea id="notes" placeholder="e.g. Where it is planted, what you noticed, what you want to remember"></textarea><label>Problems or questions</label><textarea id="problems" placeholder="e.g. Leaves yellowing, lily beetle, slug damage"></textarea><button class="button" onclick="makeDraft()">Create draft</button><button class="button" onclick="emailDraft()">Email draft to David</button><p class="hint">Future version: this will save directly to your account. For now, it keeps the shared GardenKey library protected.</p></section>
<section class="card"><h2>Draft output</h2><textarea id="out" placeholder="Your draft appears here"></textarea></section>
</main><script>
function makeDraft(){const clean=s=>String(s||'').trim(); const slug=clean(name.value).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); const id='GK-DRAFT-'+Date.now().toString().slice(-6); const p={id,slug,name:clean(name.value),category:clean(category.value),latinName:'',variety:clean(variety.value),subtitle:'Tester-created plant profile.',theme:'#2f6b45',tags:[clean(category.value)].filter(Boolean),quickCare:{Water:'',Light:'',Feeding:'',Pruning:''},notes:clean(notes.value),soil:'',medium:'',problems:clean(problems.value)?[{name:'Tester note',fix:clean(problems.value)}]:[],propagation:{season:'',methods:'',tips:'',tracker:'Record dates, method and result here.'},pollinator:{score:0,value:''},pollinatorFact:'',companions:[],timeline:{},seasonalActions:{},weeklyFact:'',photoPlan:{hero:'Whole plant photo',gallery:['Close-up of flower','Foliage detail','Winter appearance','Seed pod / fruit if relevant']}}; out.value=JSON.stringify(p,null,2); return p}
function emailDraft(){const p=out.value?JSON.parse(out.value):makeDraft(); location.href='mailto:davewalsh45pro@gmail.com?subject=GardenKey%20tester%20plant%20'+encodeURIComponent(p.name||p.id)+'&body='+encodeURIComponent(out.value)}
</script></body></html>
