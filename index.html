<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GardenKey MVP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell home-shell">
    <section class="brand-card">
      <div class="brand-mark">GK</div>
      <p class="eyebrow">GardenKey MVP</p>
      <h1>Tap a tag. Open a living plant profile.</h1>
      <p class="lede">A simple mobile-first test site for NFC plant tags, care guidance, seasonal actions and plant notes.</p>
      <div class="button-row">
        <a class="button primary" href="plant.html?id=GK-LAV-001">Open Lavender</a>
        <a class="button secondary" href="admin.html">Open Admin</a>
      </div>
    </section>

    <section class="card">
      <h2>Sample plants</h2>
      <div class="plant-list" id="plantList">Loading plants…</div>
    </section>
  </main>

  <script>
    async function loadPlants() {
      const list = document.getElementById('plantList');
      try {
        const response = await fetch('plants.json');
        const plants = await response.json();
        list.innerHTML = Object.values(plants).map(plant => `
          <a class="plant-row" href="plant.html?id=${encodeURIComponent(plant.id)}">
            <span><strong>${plant.name}</strong><small>${plant.latinName || plant.id}</small></span>
            <span class="row-arrow">→</span>
          </a>
        `).join('');
      } catch (error) {
        list.textContent = 'Could not load plant list.';
      }
    }
    loadPlants();
  </script>
</body>
</html>
